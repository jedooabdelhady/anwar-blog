<!--
  Najdi heritage frieze — a horizontal strip designed to repeat along
  the top edge of each carousel slide.  Combines silhouettes drawn from
  the Najdi/Arabian visual vocabulary the client referenced:
    palm trees, fortresses with battlements, camels, diamonds,
    tents, and small filler ornaments.
  Stroke + fill use currentColor so the band inherits the slide's
  pattern tint via CSS color.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="320" height="36" viewBox="0 0 320 36">
  <g stroke="currentColor" fill="currentColor"
     stroke-linecap="round" stroke-linejoin="round" stroke-width="1.1">

    <!-- 1 · Slim palm tree -->
    <g transform="translate(6 6)">
      <line x1="7" y1="24" x2="7" y2="13" stroke-width="1.4" fill="none"/>
      <path d="M 7 13 Q 2 9 0 6"   fill="none"/>
      <path d="M 7 13 Q 12 9 14 6" fill="none"/>
      <path d="M 7 13 Q 3 12 0 12" fill="none"/>
      <path d="M 7 13 Q 11 12 14 12" fill="none"/>
      <circle cx="7" cy="12" r="1.2"/>
    </g>

    <!-- 2 · Double diamond -->
    <g transform="translate(26 11)" fill="none">
      <path d="M 7 0 L 13 7 L 7 14 L 1 7 Z" stroke-width="1.2"/>
      <path d="M 7 3 L 10 7 L 7 11 L 4 7 Z" fill="currentColor"/>
    </g>

    <!-- 3 · Fort with battlements -->
    <g transform="translate(46 5)">
      <rect x="3" y="9" width="20" height="16" fill="none" stroke-width="1.2"/>
      <rect x="3" y="5" width="3.5" height="4"/>
      <rect x="9" y="5" width="3.5" height="4"/>
      <rect x="15" y="5" width="3.5" height="4"/>
      <rect x="21" y="5" width="2"  height="4"/>
      <rect x="11" y="15" width="4" height="10" fill="none" stroke-width="1.1"/>
    </g>

    <!-- 4 · Standing camel -->
    <g transform="translate(76 12)">
      <!-- silhouette of body with hump -->
      <path d="M 0 10
               Q 0 6 3 6
               Q 5 2 9 2
               Q 12 6 12 10
               L 18 10
               Q 19 6 22 6
               L 24 10
               L 0 10 Z"/>
      <!-- legs -->
      <line x1="2.5" y1="10" x2="2.5" y2="16" stroke-width="1.4"/>
      <line x1="6" y1="10" x2="6" y2="16" stroke-width="1.4"/>
      <line x1="18" y1="10" x2="18" y2="16" stroke-width="1.4"/>
      <line x1="22" y1="10" x2="22" y2="16" stroke-width="1.4"/>
      <!-- head -->
      <path d="M 24 10 Q 27 5 29 7 L 30 11 L 26 12 Z"/>
    </g>

    <!-- 5 · Triple-line ornament -->
    <g transform="translate(112 10)" stroke-width="1.1">
      <line x1="0" y1="3"  x2="18" y2="3"/>
      <line x1="0" y1="8"  x2="18" y2="8"/>
      <line x1="0" y1="13" x2="18" y2="13"/>
    </g>

    <!-- 6 · Geometric hex-diamond -->
    <g transform="translate(136 6)" fill="none" stroke-width="1.2">
      <path d="M 8 0 L 14 4 L 14 14 L 8 18 L 2 14 L 2 4 Z"/>
      <circle cx="8" cy="9" r="2" fill="currentColor"/>
    </g>

    <!-- 7 · Tent -->
    <g transform="translate(158 7)" fill="none" stroke-width="1.2">
      <path d="M 0 17 L 8 0 L 16 17"/>
      <line x1="8" y1="3" x2="8" y2="17"/>
      <line x1="0" y1="17" x2="16" y2="17"/>
    </g>

    <!-- 8 · Zig-zag band -->
    <g transform="translate(180 11)" fill="none" stroke-width="1.1">
      <path d="M 0 9 L 4 0 L 8 9 L 12 0 L 16 9 L 20 0 L 24 9"/>
    </g>

    <!-- 9 · Bushy palm tree -->
    <g transform="translate(212 4)" fill="none" stroke-width="1.2">
      <line x1="8" y1="26" x2="8" y2="14" stroke-width="1.5"/>
      <path d="M 8 14 Q 0 8 0 4"/>
      <path d="M 8 14 Q 16 8 16 4"/>
      <path d="M 8 14 Q 3 11 0 11"/>
      <path d="M 8 14 Q 13 11 16 11"/>
      <path d="M 8 14 Q 6 8 8 4"/>
      <path d="M 8 14 Q 10 8 8 4"/>
      <circle cx="8" cy="13" r="1.3" fill="currentColor" stroke="none"/>
    </g>

    <!-- 10 · Fort variant (wider) -->
    <g transform="translate(232 7)">
      <rect x="2" y="6" width="22" height="16" fill="none" stroke-width="1.2"/>
      <rect x="4" y="2" width="3" height="4"/>
      <rect x="10" y="2" width="3" height="4"/>
      <rect x="16" y="2" width="3" height="4"/>
      <path d="M 11 12 L 15 12 L 15 22" fill="none" stroke-width="1.1"/>
      <line x1="13" y1="14" x2="13" y2="20" stroke-width="1"/>
    </g>

    <!-- 11 · Diamond -->
    <g transform="translate(262 11)" fill="none" stroke-width="1.2">
      <path d="M 7 0 L 13 7 L 7 14 L 1 7 Z"/>
      <circle cx="7" cy="7" r="1.3" fill="currentColor"/>
    </g>

    <!-- 12 · Small reclining camel -->
    <g transform="translate(280 16)">
      <path d="M 0 6
               Q 0 4 2 4
               Q 4 1 8 1
               Q 11 4 11 6
               L 16 6
               Q 17 3 20 3
               L 22 6
               L 0 6 Z"/>
    </g>

    <!-- 13 · Vertical filler -->
    <g transform="translate(306 9)" fill="none" stroke-width="1.1">
      <line x1="2" y1="0" x2="2" y2="18"/>
      <line x1="6" y1="0" x2="6" y2="18"/>
      <line x1="4" y1="4" x2="4" y2="14" stroke-width="1.4"/>
    </g>
  </g>
</svg>
